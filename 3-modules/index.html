<!DOCTYPE html>
<html lang="en" ng-app="firstApp">

<head>
  <title>TheNetNinja Angular Playlist</title>
  <link href="content/css/styles.css" rel="stylesheet" type="text/css" />
  <script src="app/lib/angular.min.js"></script>
  <script src="app/app.js"></script>
</head>

<body ng-Init="color='blue'">
  <header ng-include="'header.html'"></header>

  <input type="text" placeholder="Enter your name" ng-model="name">
  <p>Hello {{name}} </p>

  <!-- the controller is applicaple for scope of the ol -->
  <ol style="width:fit-content" ng-controller="firstController">
    <!-- this repeats the list items (directives) -->
     <!-- we can filter the list items using the filter directive -->
    <input type="text" placeholder="Filter directives" ng-model="search">
     <!-- we can also order the list items using the orderBy directive -->
     <!-- we can also use the color variable to change the color of the directive name -->
    <li ng-repeat="directive in directives | filter:search | orderBy:'description'" style="margin: 5px; padding: 2px;">
      <span class="{{color}}">{{directive.name}}</span> {{directive.description}}
    </li>
    <li>name: {{name}} </li>
  </ol>

  <div ng-controller="secondController" style="width:fit-content; margin-top: 20px;">
    <input type="text" ng-model="searchItem" placeholder="Search for an item" style="margin-left:2em; width:200px; padding: 5px; border-radius: 6px;">
    <button ng-click="visible = false">hide out of stock</button>
    <button ng-click="visible = true">show all</button>
    <ul>
      <li ng-repeat="item in grocery | filter:searchItem" ng-show="visible? true: item.inStock" style="margin: 5px; padding: 2px; display: flex; justify-content: space-between; width: 400px;">
        {{item.name}}  <span>${{item.price | currency}} </span> <span>({{item.quantity}} in stock)</span> <span class="remove" ng-click="removeItem(item)">X</span>
      </li>
    </ul>
  </div>

</body>

</html>
